version: "3.3"

services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cve_scanner
    network_mode: host
    volumes:
      - ./output:/app/output
    command: ["localhost"]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_cve
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana"

volumes:
  grafana_data:


